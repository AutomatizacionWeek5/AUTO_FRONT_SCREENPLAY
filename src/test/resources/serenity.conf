serenity {
  project.name = "Sistema de Tickets - E2E Screenplay Tests"
  take.screenshots = FOR_FAILURES

  reports {
    show.step.details = true
  }
}

webdriver {
  driver = chrome
  base.url = "http://localhost:3000"

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-notifications", "--no-sandbox", "--disable-dev-shm-usage"]
    }
  }
}

demo.delay = 1
